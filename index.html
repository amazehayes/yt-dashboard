<title>YouTube Analytics Dashboard</title>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #6b6b80;
    --accent: #5b6ef5;
    --accent2: #3dd68c;
    --accent3: #f5a623;
    --red: #f55b5b;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .shell { display: grid; grid-template-columns: 230px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 28px 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 32px 36px; overflow-x: hidden; }
  .logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .logo-mark { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .logo-name { font-size: 15px; font-weight: 600; }
  .nav-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 24px; margin-bottom: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 24px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--text); border-left-color: var(--accent); background: rgba(91,110,245,0.08); }
  .nav-section { margin-bottom: 20px; }
  .ch-list { padding: 0 16px; margin-top: 4px; }
  .ch-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .ch-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .ch-item.active { background: rgba(255,255,255,0.07); color: var(--text); }
  .ch-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding: 16px 24px 0; border-top: 1px solid var(--border); }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* DATE FILTER */
  .filter-bar { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .filter-bar input[type=month] { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; cursor: pointer; }
  .filter-bar input[type=month]:focus { border-color: var(--accent); }
  .filter-sep { color: var(--muted); font-size: 13px; }
  .filter-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-family: var(--font); cursor: pointer; transition: all 0.15s; border: 1px solid var(--border2); background: transparent; color: var(--muted); }
  .filter-btn:hover { color: var(--text); border-color: var(--accent); }
  .filter-btn.active-q { background: rgba(91,110,245,0.12); color: var(--accent); border-color: rgba(91,110,245,0.4); }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .m-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .m-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .m-card.c1::before { background: var(--accent); }
  .m-card.c2::before { background: var(--accent2); }
  .m-card.c3::before { background: var(--accent3); }
  .m-card.c4::before { background: var(--red); }
  .m-card.c5::before { background: #c77dff; }
  .m-card.c6::before { background: #48cae4; }
  .m-card.c7::before { background: #f5c542; }
  .m-card.c8::before { background: #ff6b9d; }
  .m-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .m-val { font-size: 22px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .m-delta { font-size: 11px; margin-top: 4px; }
  .up { color: var(--accent2); } .dn { color: var(--red); }

  /* CHARTS */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .chart-card.wide { grid-column: span 2; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* TABLE */
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .tbl-head { display: grid; padding: 11px 20px; background: var(--surface2); font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; gap: 8px; border-bottom: 1px solid var(--border); }
  .tbl-row { display: grid; padding: 11px 20px; border-bottom: 1px solid var(--border); gap: 8px; align-items: center; font-size: 12px; transition: background 0.1s; }
  .tbl-row:last-child { border-bottom: none; }
  .tbl-row:hover { background: rgba(255,255,255,0.02); }
  .cell-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ret-bar-bg { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 4px; }
  .ret-bar-fill { height: 100%; border-radius: 2px; }
  .yoy-badge { font-size: 10px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; }
  .yoy-up { background: rgba(61,214,140,0.12); color: var(--accent2); }
  .yoy-dn { background: rgba(245,91,91,0.12); color: var(--red); }

  /* SECTION TITLE */
  .sec-title { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; margin-top: 8px; }

  .mono { font-family: var(--mono); font-size: 12px; }
  .profit-pos { color: var(--accent2); }
  .profit-neg { color: var(--red); }
</style>
</head>

// ── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar() {

  renderPage();
}

// ── FILTER HELPERS ────────────────────────────────────────────
function inRange(yr, mo) {
  const [fy, fm] = state.fromDate.split('-').map(Number);
  const [ty, tm] = state.toDate.split('-').map(Number);
  return (yr > fy || (yr === fy && mo >= fm)) && (yr < ty || (yr === ty && mo <= tm));
}

function getMonthly() {
  let rows = MONTHLY.filter(r => inRange(r.yr, r.mo));
  if (state.activeChannel !== 'ALL') rows = rows.filter(r => r.ch === state.activeChannel);
  return rows;
}

function getPV() {
  let rows = PER_VIDEO.filter(r => inRange(r.yr, r.mo));
  if (state.activeChannel !== 'ALL') rows = rows.filter(r => r.ch === state.activeChannel);
  return rows;
}

function getYearly(yr) {
  let rows = YEARLY[yr] || [];
  if (state.activeChannel !== 'ALL') rows = rows.filter(r => r.ch === state.activeChannel);
  return rows;
}

function agg(rows, col) { return rows.reduce((s,r) => s + (r[col]||0), 0); }
function avg(rows, col) { return rows.length ? agg(rows,col)/rows.length : 0; }
function fmt(n) { n = Math.round(n); return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'K' : n.toString(); }
function fmtD(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtDec(n,d=2) { return '$' + n.toFixed(d); }
function pct(a,b) { return b ? (((a-b)/b)*100).toFixed(1) : '—'; }
function chColor(ch) { return CH_COLORS[ch] || '#888'; }

// ── FILTER BAR ────────────────────────────────────────────────
function filterBar() {
  return `<div class="filter-bar">
    <label>From</label>
    <input type="month" id="fromDate" value="${state.fromDate}" onchange="setFrom(this.value)" min="2024-01" max="2025-12">
    <span class="filter-sep">→</span>
    <label>To</label>
    <input type="month" id="toDate" value="${state.toDate}" onchange="setTo(this.value)" min="2024-01" max="2025-12">
    <div style="margin-left:8px;display:flex;gap:6px">
      <button class="filter-btn" onclick="setQuick('2024-01','2024-12')">2024</button>
      <button class="filter-btn" onclick="setQuick('2025-01','2025-12')">2025</button>
      <button class="filter-btn" onclick="setQuick('2024-01','2025-12')">All</button>
    </div>
  </div>`;
}

function setFrom(v) { state.fromDate = v; renderPage(); }
function setTo(v) { state.toDate = v; renderPage(); }
function setQuick(f,t) { state.fromDate=f; state.toDate=t; renderPage(); }

// ── DESTROY CHARTS ────────────────────────────────────────────
function destroyCharts() { Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} }); charts = {}; }

// ── RENDER ────────────────────────────────────────────────────
function renderPage() {
  destroyCharts();
  const m = document.getElementById('mainContent');
  if (state.page === 'overview') renderOverview(m);
  else if (state.page === 'monthly') renderMonthly(m);
  else if (state.page === 'yoy') renderYoY(m);
  else if (state.page === 'pervideo') renderPerVideo(m);
  else if (state.page === 'costs') renderCosts(m);
}

      ${[2024,2025].flatMap(yr=>(YEARLY_PV[yr]||[]).map(r=>`<div class="tbl-row" style="grid-template-columns:1.5fr 60px 80px 70px 80px 80px 90px 70px">
        <div style="display:flex;align-items:center;gap:8px"><span class="ch-dot" style="background:${chColor(r.ch)}"></span>${r.ch}</div>
        <div class="mono" style="color:var(--muted)">${yr}</div>
        <div class="mono">${fmt(r.views)}</div>
        <div class="mono">${r.subs}</div>
        <div class="mono">$${r.revenue}</div>
        <div class="mono">${fmt(r.watchHrs)}</div>
        <div class="mono">${fmt(r.impressions)}</div>
        <div class="mono">$${r.costs}</div>
      </div>`)).join('')}
    </div>`;

  const dlfRows = rows.filter(r=>r.ch==='DLF');
  const pds = dlfRows.map(r=>r.period);
  charts.pvV = new Chart(document.getElementById('pvViews'),{
    type:'bar',data:{labels:pds,datasets:[{data:dlfRows.map(r=>r.views),backgroundColor:dlfRows.map(r=>r.yr===2024?'#5b6ef5':'#3dd68c'),borderRadius:4}]},
    options:chartOpts(v=>fmt(v))
  });
  charts.pvR = new Chart(document.getElementById('pvRev'),{
    type:'bar',data:{labels:pds,datasets:[{data:dlfRows.map(r=>r.revenue),backgroundColor:dlfRows.map(r=>r.yr===2024?'#f5a623':'#c77dff'),borderRadius:4}]},
    options:{...chartOpts(v=>'$'+v.toFixed(0)),plugins:{legend:{display:false}}}
  });
}

// ── COSTS & PROFIT ────────────────────────────────────────────
function renderCosts(m) {
  const rows = getMonthly();
  const dlfRows = rows.filter(r=>r.ch==='DLF');
  const totalRev = agg(dlfRows,'revenue');
  const totalCost = agg(dlfRows,'costs');
  const profit = totalRev - totalCost;
  const margin = totalRev ? ((profit/totalRev)*100).toFixed(1) : 0;

  // Yearly totals
  const yr24 = YEARLY[2024]; const yr25 = YEARLY[2025];
  const allChs = [...new Set([...yr24.map(r=>r.ch),...yr25.map(r=>r.ch)])];

  m.innerHTML = `
    <div class="page-header"><div>
      <div class="page-title">Costs & Profit</div>
      <div class="page-sub">Revenue, costs, and margin analysis</div>
    </div></div>
    ${filterBar()}
    <div class="metrics">
      <div class="m-card c3"><div class="m-label">Revenue (DLF)</div><div class="m-val">${fmtD(totalRev)}</div></div>
      <div class="m-card c4"><div class="m-label">Costs (DLF)</div><div class="m-val">${fmtD(totalCost)}</div></div>
      <div class="m-card c${profit>=0?'2':'4'}"><div class="m-label">Profit</div><div class="m-val ${profit>=0?'profit-pos':'profit-neg'}">${fmtD(profit)}</div></div>
      <div class="m-card c1"><div class="m-label">Margin</div><div class="m-val">${margin}%</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="card-title">Revenue vs costs vs profit — DLF monthly</div>
        <div class="legend">
          <span class="leg-item"><span class="leg-sq" style="background:#5b6ef5"></span>Revenue</span>
          <span class="leg-item"><span class="leg-sq" style="background:#f55b5b"></span>Costs</span>
          <span class="leg-item"><span class="leg-sq" style="background:#3dd68c"></span>Profit</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="cProfit" role="img" aria-label="Bar chart of monthly revenue costs and profit">Revenue costs profit</canvas></div>
      </div>
    </div>
    <div class="sec-title">Yearly costs & profit by channel</div>
    <div class="tbl-wrap">
      <div class="tbl-head" style="grid-template-columns:1.5fr 60px 90px 80px 80px 80px">
        <span>Channel</span><span>Year</span><span>Revenue</span><span>Costs</span><span>Profit</span><span>Margin</span>
      </div>
      ${[2024,2025].flatMap(yr=>(YEARLY[yr]||[]).map(r=>{
        const p = (r.revenue||0)-(r.costs||0);
        const mg = r.revenue ? ((p/r.revenue)*100).toFixed(1)+'%' : '—';
        return `<div class="tbl-row" style="grid-template-columns:1.5fr 60px 90px 80px 80px 80px">
          <div style="display:flex;align-items:center;gap:8px"><span class="ch-dot" style="background:${chColor(r.ch)}"></span>${r.ch}</div>
          <div class="mono" style="color:var(--muted)">${yr}</div>
          <div class="mono">${fmtD(r.revenue||0)}</div>
          <div class="mono ${r.costs>0?'profit-neg':''}">${fmtD(r.costs||0)}</div>
          <div class="mono ${p>=0?'profit-pos':'profit-neg'}">${fmtD(p)}</div>
          <div class="mono ${parseFloat(mg)>=0?'profit-pos':'profit-neg'}">${mg}</div>
        </div>`;
      })).join('')}
    </div>`;

  charts.profit = new Chart(document.getElementById('cProfit'),{
    type:'bar',
    data:{labels:dlfRows.map(r=>r.period),datasets:[
      {label:'Revenue',data:dlfRows.map(r=>r.revenue),backgroundColor:'#5b6ef5',borderRadius:3},
      {label:'Costs',data:dlfRows.map(r=>r.costs),backgroundColor:'#f55b5b',borderRadius:3},
      {label:'Profit',data:dlfRows.map(r=>r.revenue-r.costs),backgroundColor:'#3dd68c',borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>'$'+Math.round(v),font:{size:11},color:'#6b6b80'},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}},x:{ticks:{font:{size:10},color:'#6b6b80',maxRotation:45},grid:{display:false},border:{display:false}}}}
  });
}

// ── INIT ──────────────────────────────────────────────────────
buildSidebar();
renderPage();
</script>
